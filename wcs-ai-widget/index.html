<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WCS AI Widget</title>

  <!-- correct Vercel-served path -->
  <link rel="stylesheet" href="/wcs-ai-widget/widget.css" />
</head>

<body>

  <!-- optional fallback container (widget injects itself anyway) -->
  <div id="wcs-ai-widget-root"></div>

  <script>
    // 🧠 safety check so you KNOW if files load
    window.addEventListener("load", async () => {
      try {
        const jsCheck = await fetch("/wcs-ai-widget/widget.js");
        const cssCheck = await fetch("/wcs-ai-widget/widget.css");

        console.log("widget.js status:", jsCheck.status);
        console.log("widget.css status:", cssCheck.status);

        if (jsCheck.status !== 200 || cssCheck.status !== 200) {
          console.error("WCS AI Widget files not loading properly");
        }
      } catch (err) {
        console.error("Widget load error:", err);
      }
    });
  </script>

  <!-- actual widget -->
  <script defer src="/wcs-ai-widget/widget.js"></script>

  <style>
    /* makes sure page doesn’t look empty when testing */
    body {
      margin: 0;
      height: 100vh;
      background: #0f1115;
      font-family: Arial, sans-serif;
    }

    #wcs-ai-widget-root {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }
  </style>

</body>
</html>
